<!doctype html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>maketka — tKaper</title>
  <meta name="description" content="Печатные макеты tKaper: STL для 3D-печати." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script type="module" crossorigin src="./assets/app.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/app.css">
</head>

<body class="bg-ink text-slate-200 font-mono antialiased selection:bg-neon/30">

  <!-- ───────────────────────── header ───────────────────────── -->
  <header class="border-b border-line/70">
    <div class="mx-auto max-w-5xl px-5 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2 text-sm">
        <span class="text-neon">tKaper</span>
        <span class="text-dim">/</span>
        <span class="text-slate-300">maketka</span>
      </div>
      <div class="flex items-center gap-4">
        <nav class="hidden sm:flex items-center gap-4 text-xs text-dim">
          <a href="#idea" class="hover:text-neon transition" data-i18n="nav_idea"></a>
          <a href="#models" class="hover:text-neon transition" data-i18n="nav_models"></a>
          <a href="https://github.com/t-kaper/maketka" class="hover:text-mag transition" data-i18n="nav_github"></a>
        </nav>
        <!-- переключатель языка -->
        <div class="flex items-center gap-1 text-xs">
          <button data-lang="ru" aria-pressed="false"
                  class="px-2 py-1 rounded border border-line text-dim hover:text-neon transition">RU</button>
          <button data-lang="en" aria-pressed="false"
                  class="px-2 py-1 rounded border border-line text-dim hover:text-neon transition">EN</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ───────────────────────── hero / idea ───────────────────── -->
  <section id="idea" class="mx-auto max-w-5xl px-5 pt-16 pb-10">
    <p class="text-xs text-dim mb-4">
      <span class="text-neon">~/maketka</span>
      <span class="text-mag">$</span> cat idea.txt<span class="blink text-neon">▌</span>
    </p>

    <h1 class="text-3xl sm:text-5xl font-bold leading-tight tracking-tight" data-i18n="h1"></h1>

    <p class="mt-6 max-w-2xl text-slate-400 leading-relaxed" data-i18n="intro"></p>

    <div class="mt-6 flex flex-wrap gap-2 text-xs">
      <span class="px-2 py-1 rounded border border-line text-dim" data-i18n="tag_stl"></span>
      <span class="px-2 py-1 rounded border border-line text-dim" data-i18n="tag_sizes"></span>
      <span class="px-2 py-1 rounded border border-line text-dim" data-i18n="tag_grid"></span>
      <span class="px-2 py-1 rounded border border-line text-dim" data-i18n="tag_modular"></span>
    </div>
  </section>

  <!-- ───────────────────────── models ────────────────────────── -->
  <section id="models" class="mx-auto max-w-5xl px-5 pb-24">
    <div class="flex items-end justify-between mb-6">
      <h2 class="text-lg text-slate-200" data-i18n="models_h2"></h2>
      <span class="text-xs text-dim" data-i18n="models_hint"></span>
    </div>

    <div class="grid gap-5 md:grid-cols-3">

      <!-- ── Маленький ── -->
      <article class="group rounded-xl border border-line bg-panel/70 p-5 hover:border-neon/50 hover:shadow-glow transition">
        <div class="flex items-center justify-between">
          <h3 class="text-base text-slate-100" data-i18n="small_title"></h3>
          <span class="text-[10px] uppercase tracking-widest text-dim">S</span>
        </div>

        <div class="mt-5 mb-6 flex items-end justify-center gap-1 h-28">
          <div class="w-16 h-16 rounded-md border border-neon/60 bg-neon/5"></div>
        </div>

        <p class="text-xs text-slate-400 leading-relaxed" data-i18n="small_desc"></p>

        <div class="mt-5 space-y-2">
          <a data-stl="small.stl" download
             class="block text-center text-sm rounded-md border border-neon/50 text-neon py-2 hover:bg-neon/10 transition">
            ↓ small.stl
          </a>
        </div>
      </article>

      <!-- ── Средний ── -->
      <article class="group rounded-xl border border-line bg-panel/70 p-5 hover:border-neon/50 hover:shadow-glow transition">
        <div class="flex items-center justify-between">
          <h3 class="text-base text-slate-100" data-i18n="medium_title"></h3>
          <span class="text-[10px] uppercase tracking-widest text-dim">M</span>
        </div>

        <div class="mt-5 mb-6 flex items-end justify-center gap-1 h-28">
          <div class="w-4 h-14 rounded-sm border border-mag/50 bg-mag/5"></div>
          <div class="w-20 h-20 rounded-md border border-neon/60 bg-neon/5"></div>
          <div class="w-4 h-14 rounded-sm border border-mag/50 bg-mag/5"></div>
        </div>

        <p class="text-xs text-slate-400 leading-relaxed" data-i18n="medium_desc"></p>

        <div class="mt-5 space-y-2">
          <a data-stl="medium.stl" download
             class="block text-center text-sm rounded-md border border-neon/50 text-neon py-2 hover:bg-neon/10 transition">
            ↓ medium.stl
          </a>
          <a data-stl="medium_side.stl" download
             class="block text-center text-xs rounded-md border border-mag/40 text-mag py-2 hover:bg-mag/10 transition">
            ↓ medium_side.stl <span class="text-dim">· ×2</span>
          </a>
        </div>
      </article>

      <!-- ── Большой ── -->
      <article class="group rounded-xl border border-line bg-panel/70 p-5 hover:border-neon/50 hover:shadow-glow transition">
        <div class="flex items-center justify-between">
          <h3 class="text-base text-slate-100" data-i18n="large_title"></h3>
          <span class="text-[10px] uppercase tracking-widest text-dim">L</span>
        </div>

        <div class="mt-5 mb-6 flex items-end justify-center gap-1 h-28">
          <div class="w-5 h-20 rounded-sm border border-mag/50 bg-mag/5"></div>
          <div class="w-24 h-24 rounded-md border border-neon/60 bg-neon/5"></div>
          <div class="w-5 h-20 rounded-sm border border-mag/50 bg-mag/5"></div>
        </div>

        <p class="text-xs text-slate-400 leading-relaxed" data-i18n="large_desc"></p>

        <div class="mt-5 space-y-2">
          <a data-stl="large.stl" download
             class="block text-center text-sm rounded-md border border-neon/50 text-neon py-2 hover:bg-neon/10 transition">
            ↓ large.stl
          </a>
          <a data-stl="large_side.stl" download
             class="block text-center text-xs rounded-md border border-mag/40 text-mag py-2 hover:bg-mag/10 transition">
            ↓ large_side.stl <span class="text-dim">· ×2</span>
          </a>
        </div>
      </article>

    </div>

    <p class="mt-8 text-xs text-dim" data-i18n="footer_note"></p>
  </section>

  <!-- ───────────────────────── footer ────────────────────────── -->
  <footer class="border-t border-line/70">
    <div class="mx-auto max-w-5xl px-5 py-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-dim">
      <span data-i18n="footer_copy"></span>
      <span class="text-neon" data-i18n="footer_build"></span>
    </div>
  </footer>

</body>
</html>
